name: release-please

# On every push to main, maintain a "release PR" that bumps the version and
# updates the changelog from conventional commits. Merging that PR tags the
# release and publishes a GitHub Release (the source zip is attached
# automatically), which `cratemind update` then pulls.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
